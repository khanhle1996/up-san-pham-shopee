<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LYSILK · Lồng khung ảnh Shopee</title>
  <link rel="stylesheet" href="styles.css?v=13" />
</head>
<body>
  <header class="topbar">
    <h1>LYSILK · Lồng khung ảnh Shopee</h1>
    <div class="topbar-actions">
      <button id="downloadAll" class="btn-download-all">⬇ Tải hết ảnh đã ghép</button>
      <button id="clearAll" class="btn-clear">🗑 Xoá hết</button>
    </div>
  </header>

  <section class="source-block">
    <div class="source-row">
      <input type="url" id="urlInput" placeholder="https://www.lysilk.vn/products/bn651" />
      <button id="fetchBtn" class="btn-fetch">📥 Lấy ảnh size S</button>
      <div id="pasteZone" class="paste-inline" tabindex="0" title="Bấm rồi Cmd/Ctrl+V để dán ảnh">📋 Paste ảnh (Cmd+V)</div>
      <label class="file-inline" title="Chọn file ảnh">
        📁 Chọn file
        <input type="file" id="fileInput" accept="image/*" multiple hidden />
      </label>
    </div>
    <div class="url-status" id="urlStatus">Dán link sản phẩm Lysilk/Pancake → lấy ảnh size S. Hoặc paste/chọn ảnh trực tiếp.</div>
  </section>

  <section class="pool">
    <div class="pool-header">
      <span>Pool ảnh <span id="poolCount">(0)</span></span>
    </div>
    <div class="pool-list" id="poolList">
      <div class="pool-empty">Chưa có ảnh. Dán link hoặc paste ảnh ở trên.</div>
    </div>
  </section>

  <section class="composites-section">
    <div class="row-title">3 ảnh ghép (1 lớn + 2 nhỏ)</div>
    <div class="composites-row" id="composites-main"></div>

    <div class="row-title">4 ảnh vuông đơn — 1 ảnh / khung</div>
    <div class="composites-row composites-row--small" id="composites-vuong"></div>

    <div class="row-title">4 ảnh 3:4 đơn — 1 ảnh / khung</div>
    <div class="composites-row composites-row--small" id="composites-3x4"></div>
  </section>

  <script src="app.js?v=13"></script>
</body>
</html>
